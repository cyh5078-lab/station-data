<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>장비현황</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    #wrap {
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* 핀치줌 컨테이너 */
    #zoom-container {
      width: 100%;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y pinch-zoom;
    }

    iframe {
      border: none;
      display: block;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="zoom-container">
      <iframe id="content" src=""
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      ></iframe>
    </div>
  </div>

<script>
  const params   = new URLSearchParams(location.search);
  const target   = params.get("url");
  const iframe   = document.getElementById("content");
  const wrap     = document.getElementById("wrap");
  const zoomCont = document.getElementById("zoom-container");

  if (target) {
    iframe.src = decodeURIComponent(target);
  }

  function applyLayout() {
    const W = window.innerWidth;
    const H = window.innerHeight;

    if (W < H) {
      // 세로 모드 → 90도 회전
      wrap.style.width         = H + "px";
      wrap.style.height        = W + "px";
      wrap.style.transform     = `rotate(90deg) translateY(-${W}px)`;
      wrap.style.transformOrigin = "top left";

      zoomCont.style.width  = H + "px";
      zoomCont.style.height = W + "px";

      iframe.style.width  = H + "px";
      iframe.style.height = W + "px";
    } else {
      // 가로 모드
      wrap.style.width         = W + "px";
      wrap.style.height        = H + "px";
      wrap.style.transform     = "none";
      wrap.style.transformOrigin = "top left";

      zoomCont.style.width  = W + "px";
      zoomCont.style.height = H + "px";

      iframe.style.width  = W + "px";
      iframe.style.height = H + "px";
    }
  }

  applyLayout();
  window.addEventListener("resize", applyLayout);
  window.addEventListener("orientationchange", () => setTimeout(applyLayout, 300));

  // ── 핀치줌 구현 ──────────────────────────────────────────────
  let scale      = 1;
  let lastScale  = 1;
  let originX    = 0;
  let originY    = 0;
  let posX       = 0;
  let posY       = 0;
  let lastPosX   = 0;
  let lastPosY   = 0;
  let isPinching = false;

  function getDistance(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function getMidpoint(t1, t2) {
    return {
      x: (t1.clientX + t2.clientX) / 2,
      y: (t1.clientY + t2.clientY) / 2,
    };
  }

  let startDist  = 0;
  let startScale = 1;

  wrap.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
      isPinching = true;
      startDist  = getDistance(e.touches[0], e.touches[1]);
      startScale = scale;
      const mid  = getMidpoint(e.touches[0], e.touches[1]);
      originX    = mid.x;
      originY    = mid.y;
      e.preventDefault();
    } else if (e.touches.length === 1) {
      isPinching = false;
      lastPosX   = e.touches[0].clientX - posX;
      lastPosY   = e.touches[0].clientY - posY;
    }
  }, { passive: false });

  wrap.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2 && isPinching) {
      const dist  = getDistance(e.touches[0], e.touches[1]);
      scale       = Math.min(Math.max(startScale * (dist / startDist), 1), 5);
      applyTransform();
      e.preventDefault();
    } else if (e.touches.length === 1 && scale > 1) {
      posX = e.touches[0].clientX - lastPosX;
      posY = e.touches[0].clientY - lastPosY;
      applyTransform();
      e.preventDefault();
    }
  }, { passive: false });

  wrap.addEventListener("touchend", (e) => {
    if (e.touches.length < 2) isPinching = false;
    // 1배로 돌아오면 위치 초기화
    if (scale <= 1) {
      scale = 1; posX = 0; posY = 0;
      applyTransform();
    }
  });

  // 더블탭 → 원래 크기로
  let lastTap = 0;
  wrap.addEventListener("touchend", (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      scale = 1; posX = 0; posY = 0;
      applyTransform();
    }
    lastTap = now;
  });

  function applyTransform() {
    iframe.style.transformOrigin = `${originX}px ${originY}px`;
    iframe.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }

  // Screen Orientation API
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
</script>
</body>
</html>
