<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장비현황</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #frame-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100vh;   /* 세로↔가로 교체 */
      height: 100vw;
      transform-origin: top left;
      transform: rotate(90deg) translateY(-100%);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 이미 가로 모드면 회전 안 함 */
    @media (orientation: landscape) {
      #frame-wrap {
        width: 100vw;
        height: 100vh;
        transform: none;
      }
    }
  </style>
</head>
<body>

<div id="frame-wrap">
  <iframe id="content" src="" allowfullscreen></iframe>
</div>

<script>
  // URL 파라미터에서 target 가져오기
  const params = new URLSearchParams(location.search);
  const target = params.get("url");

  if (target) {
    document.getElementById("content").src = decodeURIComponent(target);
  } else {
    document.body.innerHTML = "<p style='color:white;padding:20px'>URL 파라미터가 없습니다.</p>";
  }

  // Screen Orientation API 지원 시 가로 강제
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
</script>

</body>
</html>
